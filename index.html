<!DOCTYPE html>
<html>
<head>
    <title>My Shared Timers</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .timer-card { border: 1px solid #ccc; margin: 10px; padding: 10px; display: inline-block; width: 200px; }
    </style>
</head>
<body>
    <h1>Our Timers</h1>
    <div id="timer-list"></div>

    <script>
        // ADD NEW TIMERS HERE
        const timersData = [
            { label: "Egg Timer", seconds: 300 },
            { label: "Workout Rest", seconds: 60 },
            { label: "Deep Work", seconds: 1500 }
        ];

        const container = document.getElementById('timer-list');

        timersData.forEach(timer => {
            const div = document.createElement('div');
            div.className = 'timer-card';
            div.innerHTML = `<h3>${timer.label}</h3><p id="${timer.label}-display">${timer.seconds}s</p>`;
            container.appendChild(div);

            let timeLeft = timer.seconds;
            setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    document.getElementById(`${timer.label}-display`).innerText = timeLeft + "s";
                }
            }, 1000);
        });
    </script>
</body>
</html>
